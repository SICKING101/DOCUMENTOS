<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ajustes</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/themes/dark.css">
</head>
<body>
  <main class="ajustes-bonito accesible">
    <h1 class="ajustes-titulo"><i class="fas fa-cog"></i> Ajustes</h1>
    <form id="settings-form" class="ajustes-form-bonita">
      <div class="ajustes-card">
        <h2><i class="fas fa-palette"></i> Tema</h2>
        <div class="ajustes-opciones">
          <label class="custom-radio"><input type="radio" name="theme" value="light" checked> Claro</label>
          <label class="custom-radio"><input type="radio" name="theme" value="dark"> Oscuro</label>
        </div>
      </div>
      <div class="ajustes-card">
        <h2><i class="fas fa-language"></i> Idioma</h2>
        <div class="ajustes-opciones">
          <div class="custom-select-wrapper">
            <select name="language" class="custom-select">
              <option value="es">Español</option>
              <option value="en">English</option>
            </select>
            <span class="custom-arrow"><i class="fas fa-chevron-down"></i></span>
          </div>
        </div>
      </div>
      <div class="ajustes-card">
        <h2><i class="fas fa-bell"></i> Notificaciones</h2>
        <div class="ajustes-opciones">
          <label class="custom-checkbox"><input type="checkbox" name="notifications" checked> Activar notificaciones</label>
        </div>
      </div>
      <div class="ajustes-card">
        <h2><i class="fas fa-universal-access"></i> Accesibilidad</h2>
        <div class="ajustes-opciones">
          <label class="custom-checkbox"><input type="checkbox" name="highContrast"> Alto contraste</label>
          <label class="custom-checkbox"><input type="checkbox" name="fontSize"> Fuente grande</label>
        </div>
      </div>
      <button type="submit" class="ajustes-btn-bonito accesible-btn"><i class="fas fa-save"></i> Guardar cambios</button>
    </form>
  </main>
  <style>
    .ajustes-bonito {
      max-width: 800px;
      margin: 2.5rem auto 0 auto;
      padding: 2rem 1rem 3rem 1rem;
      background: var(--bg-secondary, #f8fafc);
      border-radius: 2.5rem;
      box-shadow: 0 4px 32px rgba(0,0,0,0.07);
    }
    .ajustes-titulo {
      font-size: 2.2rem;
      font-weight: 800;
      margin-bottom: 2.5rem;
      color: var(--primary, #4f46e5);
      display: flex;
      align-items: center;
      gap: 0.7rem;
    }
    .ajustes-form-bonita {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 2rem;
    }
    .ajustes-card {
      background: var(--card-bg, #fff);
      border-radius: 1.7rem;
      box-shadow: 0 2px 16px rgba(0,0,0,0.09);
      padding: 2rem 1.5rem 1.5rem 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
      border: 1.5px solid var(--border, #e5e7eb);
      min-width: 0;
      transition: box-shadow 0.25s, border 0.25s;
    }
    .ajustes-card:focus-within, .ajustes-card:hover {
      box-shadow: 0 6px 32px rgba(79,70,229,0.13);
      border: 1.5px solid var(--primary, #4f46e5);
    }
    .ajustes-card h2 {
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--primary, #6366f1);
      margin-bottom: 0.5rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .ajustes-opciones {
      display: flex;
      flex-direction: column;
      gap: 0.7rem;
    }
    /* Custom radio */
    .custom-radio input[type="radio"] {
      appearance: none;
      width: 1.2em;
      height: 1.2em;
      border: 2px solid var(--primary, #6366f1);
      border-radius: 50%;
      background: var(--bg-primary, #fff);
      margin-right: 0.6em;
      outline: none;
      transition: border 0.2s, box-shadow 0.2s;
      box-shadow: 0 1px 4px rgba(99,102,241,0.08);
      position: relative;
      vertical-align: middle;
    }
    .custom-radio input[type="radio"]:checked {
      background: radial-gradient(circle at 50% 50%, var(--primary, #6366f1) 55%, transparent 60%);
      border-color: var(--primary, #6366f1);
    }
    .custom-radio input[type="radio"]:focus {
      box-shadow: 0 0 0 3px rgba(99,102,241,0.18);
    }
    /* Custom checkbox */
    .custom-checkbox input[type="checkbox"] {
      appearance: none;
      width: 1.2em;
      height: 1.2em;
      border: 2px solid var(--primary, #6366f1);
      border-radius: 0.5em;
      background: var(--bg-primary, #fff);
      margin-right: 0.6em;
      outline: none;
      transition: border 0.2s, box-shadow 0.2s;
      box-shadow: 0 1px 4px rgba(99,102,241,0.08);
      position: relative;
      vertical-align: middle;
    }
    .custom-checkbox input[type="checkbox"]:checked {
      background: linear-gradient(135deg, var(--primary, #6366f1) 60%, var(--accent, #818cf8) 100%);
      border-color: var(--primary, #6366f1);
    }
    .custom-checkbox input[type="checkbox"]:checked::after {
      content: '\2713';
      color: #fff;
      font-size: 1em;
      position: absolute;
      left: 0.18em;
      top: 0.02em;
      font-weight: bold;
      pointer-events: none;
    }
    .custom-checkbox input[type="checkbox"]:focus {
      box-shadow: 0 0 0 3px rgba(99,102,241,0.18);
    }
    /* Custom select */
    .custom-select-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }
    .custom-select {
      width: 100%;
      padding: 0.6rem 2.2rem 0.6rem 1.2rem;
      border-radius: 1.2rem;
      border: 1.5px solid var(--primary, #6366f1);
      font-size: 1.05rem;
      background: var(--bg-primary, #fff);
      color: var(--text-primary, #222);
      box-shadow: 0 1px 4px rgba(99,102,241,0.08);
      transition: border 0.2s, box-shadow 0.2s;
      appearance: none;
      outline: none;
    }
    .custom-select:focus {
      border-color: var(--primary-dark, #3730a3);
      box-shadow: 0 0 0 3px rgba(99,102,241,0.13);
    }
    .custom-arrow {
      position: absolute;
      right: 1.1rem;
      pointer-events: none;
      color: var(--primary, #6366f1);
      font-size: 1.1em;
      top: 50%;
      transform: translateY(-50%);
    }
    /* Botón accesible y animado */
    .ajustes-btn-bonito.accesible-btn {
      font-size: 1.15rem;
      font-weight: 700;
      border-radius: 1.7rem;
      background: linear-gradient(90deg, var(--primary, #4f46e5) 60%, var(--accent, #6366f1) 100%);
      color: #fff;
      border: none;
      box-shadow: 0 2px 12px rgba(99,102,241,0.13);
      cursor: pointer;
      padding: 1rem 2.7rem;
      margin: 2.5rem auto 0 auto;
      display: block;
      transition: background 0.22s, transform 0.18s, box-shadow 0.18s;
      outline: none;
    }
    .ajustes-btn-bonito.accesible-btn:focus {
      box-shadow: 0 0 0 4px rgba(99,102,241,0.18);
      background: linear-gradient(90deg, var(--primary-dark, #3730a3) 60%, var(--accent, #6366f1) 100%);
    }
    .ajustes-btn-bonito.accesible-btn:hover {
      background: linear-gradient(90deg, var(--primary-dark, #3730a3) 60%, var(--accent, #6366f1) 100%);
      transform: translateY(-2px) scale(1.04);
      box-shadow: 0 6px 24px rgba(99,102,241,0.18);
    }
    .ajustes-btn-bonito.accesible-btn:active {
      transform: scale(0.98);
    }
    @media (max-width: 600px) {
      .ajustes-form-bonita {
        grid-template-columns: 1fr;
      }
      .ajustes-bonito {
        padding: 1rem 0.2rem 2rem 0.2rem;
      }
    }
  </style>
  <script src="../src/frontend/modules/ajustes.js"></script>
</body>
</html>
