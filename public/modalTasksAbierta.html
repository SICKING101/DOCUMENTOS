<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- Enlace al archivo de estilos externo -->
    <link rel="stylesheet" href="styles.css"> 
    <style>

    .modal {
        position: fixed;
        inset: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        background: rgba(0,0,0,0.5); 
    }

    </style>
</head>
<body>
    <section id="viewTaskModal" class="modal">
        <article class="modal__content">
            <header class="modal__header">
                <h3 class="modal__title">Detalles de la Tarea</h3>
                <button class="modal__close">&times;</button>
            </header>

            <section class="modal__body">

                <div class="form__group">
                    <label class="form__label">Título</label>
                    <p class="modal__value">Reporte de calificaciones 5tos</p>
                </div>

                <div class="form__group">
                    <label class="form__label">Fecha Límite</label>
                    <p class="modal__value">2025-11-28</p>
                </div>

                <div class="form__group">
                    <label class="form__label">Descripción</label>
                    <p class="modal__value">
                        Recabar las calificaciones finales de los estudiantes de 5to grado y preparar el reporte para la reunión de padres.
                    </p>
                </div>

            </section>

            <footer class="modal__footer">
                <button class="btn btn--outline">Cerrar</button>
                <button class="btn btn--primary">Marcar como Completada</button>
            </footer>
        </article>
    </section>



</body>
</html>
