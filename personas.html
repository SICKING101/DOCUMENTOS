<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Personas — Portal de Archivos Docentes</title>
    <style>
      /* Variables globales */
      :root {
        --bg-main: #121212;
        --bg-card: #1E1E1E;
        --text-primary: #fff;
        --text-secondary: #ccc;
        --text-muted: rgba(255, 255, 255, 0.6);
        --border-color: #2A2A2A;
        --accent: #50E3C2;
        --button-bg: #A0A0A0;
        --input-bg: #121212;
        --card-shadow: 0 8px 24px var(--accent);
        --spacing-sm: 0.5rem;
        --spacing-md: 1rem;
        --spacing-lg: 1.5rem;
        --spacing-xl: 2rem;
        --radius-sm: 8px;
        --radius-lg: 16px;
      }

      /* BEM Blocks */
      .page {
        background-color: var(--bg-main);
        color: var(--text-primary);
        min-height: 100vh;
        margin: 0;
        font-family: Arial, sans-serif;
      }

      /* Header Block */
      .header {
        max-width: 980px;
        margin: var(--spacing-lg) auto;
        padding: 0 var(--spacing-md);
      }

      .header__title {
        font-size: 2.5rem;
        font-weight: 700;
        margin: var(--spacing-lg) 0;
        text-align: center;
      }

      .header__nav {
        display: flex;
        justify-content: center;
        gap: var(--spacing-sm);
      }

      .header__button {
        background-color: var(--button-bg);
        color: var(--text-primary);
        padding: 0.6rem 0.9rem;
        font-size: 1.1rem;
        border: none;
        border-radius: var(--radius-sm);
        cursor: pointer;
        transition: background 0.2s;
      }

      .header__button:hover {
        background-color: var(--accent);
      }

      .header__link {
        text-decoration: none;
      }

      /* Search Block */
      .search {
        display: flex;
        gap: var(--spacing-md);
        align-items: center;
        margin-bottom: var(--spacing-lg);
      }

      .search__input {
        width: 300px;
        padding: var(--spacing-sm) var(--spacing-md);
        border-radius: var(--radius-sm);
        border: 1px solid var(--border-color);
        background: var(--input-bg);
        color: var(--text-primary);
        font-size: large;
      }

      .search__select {
        padding: var(--spacing-sm) var(--spacing-md);
        border-radius: var(--radius-sm);
        border: 1px solid var(--border-color);
        background: var(--input-bg);
        color: var(--text-primary);
        font-size: large;
        cursor: pointer;
      }

      /* Card Block */
      .card {
        width: min(900px, 95%);
        margin: var(--spacing-xl) auto;
        background: var(--bg-card);
        border: 1px solid var(--border-color);
        border-radius: var(--radius-lg);
        padding: var(--spacing-xl);
        box-shadow: var(--card-shadow);
      }

      /* Person Data Block */
      .person {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: var(--spacing-md);
        background: rgba(255,255,255,0.03);
        border-radius: var(--radius-sm);
      }

      .person__info {
        display: flex;
        flex-direction: column;
        gap: var(--spacing-sm);
        text-align: left;
      }

      .person__field {
        margin: 0;
        font-size: 1rem;
        color: var(--text-primary);
      }

      /* Teachers List Block */
      .teachers {
        margin-top: var(--spacing-lg);
      }

      .teachers__list {
        display: flex;
        flex-direction: column;
        gap: var(--spacing-md);
        list-style: none;
        padding: 0;
      }

      .teachers__item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: var(--spacing-md);
        background: rgba(255,255,255,0.03);
        border-radius: var(--radius-sm);
        transition: background 0.2s;
      }

      .teachers__item:hover {
        background: rgba(80,227,194,0.1);
      }

      .teachers__info {
        display: flex;
        flex-direction: column;
        gap: var(--spacing-sm);
        text-align: left;
      }

      .teachers__name {
        font-weight: 600;
        color: var(--text-primary);
      }

      .teachers__meta {
        font-size: 0.85rem;
        color: var(--text-muted);
      }
    </style>
  </head>
  <body class="page">
    <header class="header">
      <h1 class="header__title">Portal de Archivos Docentes</h1>
      
      <nav class="header__nav">
        <a href="pag_web.html" class="header__link">
          <button class="header__button">Dashboard</button>
        </a>
        <a href="personas.html" class="header__link">
          <button class="header__button">Personas</button>
        </a>
      </nav>
    </header>

    <main class="card">
      <form class="search" role="search">
        <input 
          class="search__input" 
          type="text" 
          placeholder="Buscar Docente..." 
          aria-label="Buscar Docente"
          id="searchInput"
        >
        
        <select class="search__select" aria-label="Filtrar por" id="filterSelect">
          <option value="todos">Todos</option>
          <option value="matematicas">Matemáticas</option>
          <option value="fisica">Física</option>
          <option value="quimica">Química</option>
        </select>
      </form>

      <section class="teachers">
        <ul class="teachers__list" id="teachersList">
          <li class="teachers__item">
            <div class="teachers__info">
              <span class="teachers__name">María González</span>
              <span class="teachers__meta">Área: Matemáticas · No. Control: M2023</span>
            </div>
            <button class="header__button">Ver Detalles</button>
          </li>

          <li class="teachers__item">
            <div class="teachers__info">
              <span class="teachers__name">Juan Pérez</span>
              <span class="teachers__meta">Área: Física · No. Control: F2023</span>
            </div>
            <button class="header__button">Ver Detalles</button>
          </li>

          <li class="teachers__item">
            <div class="teachers__info">
              <span class="teachers__name">Ana Ramírez</span>
              <span class="teachers__meta">Área: Química · No. Control: Q2023</span>
            </div>
            <button class="header__button">Ver Detalles</button>
          </li>
        </ul>
      </section>
    </main>

    <script>
      const searchInput = document.getElementById('searchInput');
      const filterSelect = document.getElementById('filterSelect');
      const teachersList = document.getElementById('teachersList');

      function filterTeachers() {
        const searchTerm = searchInput.value.toLowerCase();
        const filterValue = filterSelect.value;
        const teachers = teachersList.getElementsByClassName('teachers__item');

        Array.from(teachers).forEach(teacher => {
          const name = teacher.querySelector('.teachers__name').textContent.toLowerCase();
          const meta = teacher.querySelector('.teachers__meta').textContent.toLowerCase();
          const matchesSearch = name.includes(searchTerm) || meta.includes(searchTerm);
          const matchesFilter = filterValue === 'todos' || meta.includes(filterValue);
          
          teacher.style.display = matchesSearch && matchesFilter ? 'flex' : 'none';
        });
      }

      searchInput.addEventListener('input', filterTeachers);
      filterSelect.addEventListener('change', filterTeachers);
    </script>
  </body>
</html>
