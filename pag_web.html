<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Portal de Archivos Docentes</title>
    <link rel="stylesheet" href="styles.css">
  </head>

  <body class="page">
    <header class="header">
      <h1 class="header__title">Portal de Archivos Docentes</h1>
      
      <nav class="header__nav">
        <a href="pag_web.html" class="header__link">
          <button class="header__button">Dashboard</button>
        </a>
        <a href="personas.html" class="header__link">
          <button class="header__button">Personas</button>
        </a>
      </nav>
    </header>

    <main class="card">
      <article class="people">
        <h2 class="people__title">Personal Reciente</h2>
        
        <ul class="people__list" id="peopleList">
          <li class="people__item" data-area="Matemáticas" data-tipo="Docente">
            <section class="people__info">
              <span class="people__name">María González</span>
              <span class="people__meta">Área: Matemáticas · Último acceso: Hace 5 min</span>
            </section>
            <button class="header__button people__btn">Ver Perfil</button>
          </li>
          <li class="people__item" data-area="Física" data-tipo="Administración">
            <section class="people__info">
              <span class="people__name">Juan Pérez</span>
              <span class="people__meta">Área: Física · Último acceso: Hace 1 hora</span>
            </section>
            <button class="header__button people__btn">Ver Perfil</button>
          </li>
          <li class="people__item" data-area="Química" data-tipo="Otro">
            <section class="people__info">
              <span class="people__name">Ana Ramírez</span>
              <span class="people__meta">Área: Química · Último acceso: Hace 2 horas</span>
            </section>
            <button class="header__button people__btn">Ver Perfil</button>
          </li>
        </ul>
      </article>
    </main>

    <!-- Modal sin div -->
    <dialog id="profileModal" class="modal">
      <article class="modal__content">
        <header>
          <h2 id="modalName">Nombre del docente</h2>
          <p id="modalArea">Área:</p>
          <p id="modalTipo">Tipo:</p>
        </header>
        <section>
          <h3>Archivos Recientes</h3>
          <ul id="modalFiles" class="modal__files"></ul>
        </section>
        <footer>
          <button id="closeModal" class="header__button">Cerrar</button>
        </footer>
      </article>
    </dialog>

    <script src="pag_web.js" defer></script>
  </body>
</html>
