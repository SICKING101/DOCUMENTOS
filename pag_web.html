<!DOCTYPE html>
<html>
  <!--
  To-Do's
  Hacer la app "Responsive" (Adaptable a moviles)
  Agregar funcionalidad a los botones (Subir, Descargar, Buscar)
  -->
  <head>
    <title>Portal de Archivos Docentes</title>
    <style>
      /* Cambiar fondo de pagina a color negro */
      body {
        background-color: #121212;
        color: #fff;
        margin: 0;
        min-height: 100vh;
        text-align: center;
      }

      /* Ajustes de title */
      .title {
        font-size: 2.5rem;
        font-weight: 700;
        margin: 1.5rem 0;
      }
      
      button {
        background-color: #A0A0A0;
        color: white;
        text-decoration-color: #E0E0E0;
        padding: 0.75rem 1.25rem;
        font-size: 1.1rem;
        border: none;
        border-radius: 6px;
        margin: 0.5rem;
        min-width: 140px;
        cursor: pointer;
      }

      .button-row {
        display: flex;
        gap: 1rem;
        flex-wrap: wrap;
        justify-content: center;
      }

      .card {
        width: min(900px, 95%);
        margin: 3rem auto;
        background: #1E1E1E;
        border: 1px solid #2A2A2A;
        border-radius: 16px;
        padding: 2rem;
        box-shadow: 0 8px 24px #50E3C2;
        display: flex;
        flex-direction: column;
        align-items: left;
        gap: 1rem;
      }

      .card-input {
        width: 300px;
        padding: 0.5rem 0.75rem;
        border-radius: 8px;
        border: 1px solid #333;
        background: #121212;
        color: #fff;
        outline: none;
        font-size: large;
      }
      .card-input::placeholder { color: rgba(255,255,255,0.6); }

      /* Agregar contenedor para la barra de búsqueda y el dropdown */
      .search-row {
        display: flex;
        gap: 1rem;
        align-items: center;
      }

      /* Estilos para el dropdown */
      .card-select {
        padding: 0.5rem 0.75rem;
        border-radius: 8px;
        border: 1px solid #333;
        background: #121212;
        color: #fff;
        outline: none;
        font-size: large;
        cursor: pointer;
      }

      /* Estilos para la sección de datos */
      .datos {
        display: flex;
        flex-direction: row;
        justify-content: space-between;
        align-items: center;
        padding: 1rem;
      }

      .datos-headers {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 0.5rem;
      }

      .datos h3 {
        margin: 0;
        font-size: 1rem;
      }

      /* Estilo para el contenedor del logo */
      .logo-container {
        position: absolute;
        top: 1rem;
        left: 1rem;
        display: flex;
        align-items: center;
        gap: 1rem;
      }

      .logo-container img {
        width: 60px;
        height: 60px;
        object-fit: contain;
      }
    </style>
  </head>
  <body>
    <!-- Agregar el logo -->
    <section class="logo-container">
      <img src="cbtis_logo.png" alt="Logo CBTIS">
    </section>

    <h1 class="title">Portal de Archivos Docentes</h1>

    <!-- Botones: el de Personas abre la página personas.html -->
    <section class="button-row" role="navigation" aria-label="acciones">
      <button>Dashboard</button>

      <!-- Enlace simple hacia la pagina de personas -->
      <a href="personas.html" style="text-decoration:none;">
        <button>Personas</button>
      </a>
    </section>


    <!-- main card -->
    <main class="card" role="main">
      <section class="search-row">
        <input class="card-input" type="text" placeholder="Buscar Docente..." aria-label="Buscar Docente">
        
        <select class="card-select" aria-label="Filtrar por">
          <option value="nombre">Nombre</option>
          <option value="materia">Materia</option>
          <option value="fecha">Fecha</option>
        </select>
      </section>

      <article class="card datos" role="article">
        <section class="datos-headers">
          <h3>Nombre:</h3>
          <h3>Area:</h3>
          <h3>No Control:</h3>
        </section>
        <button aria-label="Botón de descarga">Descargar</button>
      </article>
    </main>
  </body>
</html>
